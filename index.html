<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 10px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    li:hover {
      background: #fafafa;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li button.delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    li button.delete:hover {
      color: #e74c3c;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0;
    }

    .footer button:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 24px 0;
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 24px 0;
      font-size: 0.9rem;
    }

    .error-msg {
      background: #fff0f0;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>
    <div class="error-msg" id="errorMsg"></div>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="120">
      <button onclick="addTodo()">+</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>
    <ul id="todoList"><li class="loading">Yükleniyor...</li></ul>
    <div class="footer">
      <span id="countLabel"></span>
      <button onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://cccmiceargspevrtraqo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjY21pY2VhcmdzcGV2cnRyYXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzY0NDgsImV4cCI6MjA5Mzc1MjQ0OH0.1UeobW0vyR3ouMeOVRQ5hp-bpa1ZONw7rZYkuDJp8vM';

    let todos = [];
    let filter = 'all';

    function headers() {
      return {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      };
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function fetchTodos() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/todos?order=created_at.desc`, {
        headers: headers()
      });
      if (!res.ok) { showError('Görevler yüklenemedi.'); return; }
      todos = await res.json();
      render();
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      const res = await fetch(`${SUPABASE_URL}/rest/v1/todos`, {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ text, done: false })
      });
      if (!res.ok) { showError('Görev eklenemedi.'); return; }
      const [created] = await res.json();
      todos.unshift(created);
      render();
    }

    async function toggle(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const newDone = !todo.done;

      const res = await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
        method: 'PATCH',
        headers: headers(),
        body: JSON.stringify({ done: newDone })
      });
      if (!res.ok) { showError('Güncelleme başarısız.'); return; }
      todo.done = newDone;
      render();
    }

    async function remove(id) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
        method: 'DELETE',
        headers: { ...headers(), 'Prefer': '' }
      });
      if (!res.ok) { showError('Silme başarısız.'); return; }
      todos = todos.filter(t => t.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = todos.filter(t => t.done).map(t => t.id);
      if (doneIds.length === 0) return;

      const res = await fetch(`${SUPABASE_URL}/rest/v1/todos?done=eq.true`, {
        method: 'DELETE',
        headers: { ...headers(), 'Prefer': '' }
      });
      if (!res.ok) { showError('Silme başarısız.'); return; }
      todos = todos.filter(t => !t.done);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">Görev yok</li>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            <span>${escHtml(t.text)}</span>
            <button class="delete" onclick="remove(${t.id})">&#10005;</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('countLabel').textContent = `${remaining} görev kaldı`;
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    fetchTodos();
  </script>
</body>
</html>
